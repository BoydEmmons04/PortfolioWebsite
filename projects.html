<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Project archive with reusable project cards and a simple system for adding new work."
    />
    <title>Portfolio | Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body data-page="projects">
    <div class="site-shell">
      <header class="site-header" data-site-header></header>

      <main>
        <section class="page-hero section">
          <div class="glass-panel">
            <p class="eyebrow">Project Archive</p>
            <h1>All past and current projects</h1>
            <!--<p>
              Each card is generated from a shared data source. Update one file
              to add a new project, edit links, change tags, or swap featured
              items on the home page.
            </p>-->
          </div>
        </section>

        <section class="section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">All Projects</p>
            </div>
          </div>
          <div class="project-grid" data-project-list="all"></div>
        </section>
      </main>

      <footer class="site-footer" data-site-footer></footer>
    </div>

    <script src="assets/js/projects-data.js"></script>
    <script src="assets/js/site.js"></script>
  </body>
</html>
